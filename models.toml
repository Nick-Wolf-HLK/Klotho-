[orchestrator]
model = "glm-5.2:cloud"
base_url = "http://127.0.0.1:11434/v1"

[judge]
model = "gpt-oss:20b"

[[subagents]]
name = "minimax"
model = "minimax-m2.7:cloud"
order = 1

[[subagents]]
name = "nemotron"
model = "nemotron-3-super:cloud"
order = 2

[[subagents]]
name = "qwen"
model = "qwen3.5:27b"
order = 3

[execution]
root_lock = "."
log_file = "~/.klotho/log.jsonl"
dry_run_default = false

[rubric]
criteria = ["completeness", "feasibility", "originality", "depth"]

[agent]
# Nur für den (optionalen) agentischen Modus relevant. Der Coverage-Audit nutzt
# stattdessen direkte Code-Einspeisung (siehe [coverage]) und ignoriert dies.
max_iterations = 40

[coverage]
# Coverage-Audit: garantierte Abdeckung des GANZEN Repos per DIREKTER
# Code-Einspeisung — EIN LLM-Call pro Chunk (kein agentischer Tool-Loop, der
# pro Chunk Dutzende Calls mit wachsendem Kontext bräuchte = token-effizient).
chunk_size = 6       # Dateien pro Chunk (Obergrenze)
chunk_chars = 24000  # Zeichen-Budget des eingespeisten Codes pro Chunk
concurrency = 3      # gleichzeitig laufende Calls (gegen Rate-Limit/429)
max_rounds = 1       # volle Runden für loop-until-dry
adjudicate = true    # adversariale Gegenprüfung je Befund (1 Call/Befund; false spart Tokens)