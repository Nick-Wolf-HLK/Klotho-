[orchestrator]
model = "glm-5.2:cloud"
base_url = "http://127.0.0.1:11434/v1"

[judge]
model = "gpt-oss:20b"

[[subagents]]
name = "minimax"
model = "minimax-m2.7:cloud"
order = 1

[[subagents]]
name = "nemotron"
model = "nemotron-3-super:cloud"
order = 2

[[subagents]]
name = "qwen"
model = "qwen3.5:27b"
order = 3

[execution]
root_lock = "."
log_file = "~/.klotho/log.jsonl"
dry_run_default = false

[rubric]
criteria = ["completeness", "feasibility", "originality", "depth"]

[compression]
# TSCG-inspirierte Token-Kompression der Subagenten-Antworten (Judge + Synthese).
# off | safe (verlustarm) | aggressive (kürzt sehr lange Antworten)
level = "safe"

[context]
# Token-Budget für eingespeisten Quellcode (Code-Einspeisung).
# Klotho filtert Ballast (venv, node_modules, dist, …) und speist Quellcode
# bis zu diesem Budget ein (kleine Dateien zuerst).
budget = 60000

[agent]
# Schritte (Werkzeug-Runden) pro agentischem Subagenten, der den Projektordner
# selbst durchsucht. Höher = gründlicher (mehr Dateien gelesen), aber langsamer
# und mehr Tokens. Für riesige Repos hochsetzen (z. B. 100–150).
max_iterations = 60