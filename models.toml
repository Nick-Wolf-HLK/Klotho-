[orchestrator]
model = "glm-5.2:cloud"
base_url = "http://127.0.0.1:11434/v1"

[judge]
model = "gpt-oss:20b"

[[subagents]]
name = "minimax"
model = "minimax-m2.7:cloud"
order = 1

[[subagents]]
name = "nemotron"
model = "nemotron-3-super:cloud"
order = 2

[[subagents]]
name = "qwen"
model = "qwen3.5:27b"
order = 3

[execution]
root_lock = "."
log_file = "~/.klotho/log.jsonl"
dry_run_default = false

[rubric]
criteria = ["completeness", "feasibility", "originality", "depth"]

[agent]
# Schritte (Werkzeug-Runden) pro agentischem Subagenten, der den Projektordner
# selbst durchsucht. Höher = gründlicher (mehr Dateien gelesen), aber langsamer
# und mehr Tokens. Für riesige Repos hochsetzen (z. B. 150–300).
max_iterations = 80

[coverage]
# Coverage-Audit: garantierte Abdeckung des GANZEN Repos × Analyse-Lenses,
# selbstskalierend. Jede Datei wird mindestens einem Agenten zugewiesen, der sie
# garantiert liest; nicht gelesene Dateien werden in Nachrunden neu verteilt.
chunk_size = 15     # Dateien pro Agent (kleiner = mehr Agenten, gründlicher)
concurrency = 6     # gleichzeitig laufende Agenten (gegen Überlastung/Timeouts)
max_rounds = 2      # volle Runden für loop-until-dry (Abbruch, wenn nichts Neues)