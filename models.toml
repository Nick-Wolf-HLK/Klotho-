[orchestrator]
model = "glm-5.2:cloud"
base_url = "http://127.0.0.1:11434/v1"

[judge]
model = "gpt-oss:20b"

[[subagents]]
name = "minimax"
model = "minimax-m2.7:cloud"
order = 1

[[subagents]]
name = "nemotron"
model = "nemotron-3-super:cloud"
order = 2

[[subagents]]
name = "qwen"
model = "qwen3.5:27b"
order = 3

[execution]
root_lock = "."
log_file = "~/.klotho/log.jsonl"
dry_run_default = false

[rubric]
criteria = ["completeness", "feasibility", "originality", "depth"]

[agent]
# Schritte (Werkzeug-Runden) pro agentischem Subagenten. Bei kleinen Chunks
# (siehe [coverage]) reichen wenige Runden; höher = gründlicher, aber teurer.
max_iterations = 40

[coverage]
# Coverage-Audit: garantierte Abdeckung des GANZEN Repos, EIN Voll-Audit-Agent
# pro Chunk (prüft alle Kategorien per Checkliste — effizient). Jede Datei wird
# mindestens einem Agenten zugewiesen; nicht gelesene werden neu verteilt.
chunk_size = 10     # Dateien pro Agent (kleiner = mehr Agenten, gründlicher, teurer)
concurrency = 3     # gleichzeitig laufende Agenten (gegen Rate-Limit/429)
max_rounds = 1      # volle Runden für loop-until-dry (hochsetzen = gründlicher, teurer)
adjudicate = true   # adversariale Gegenprüfung der Befunde (false spart Tokens)